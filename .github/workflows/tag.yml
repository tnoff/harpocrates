name: Tag Build

on:
  push:
    branches: [main]

jobs:
  tag:
    uses: tnoff/github-workflows/.github/workflows/tag.yml@39e12f56e2a091e61ba84b1d8615d176f11f49a2
    with:
      version_file: './VERSION'
    permissions:
      contents: write

  build:
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 20
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version from VERSION file
        id: version
        run: |
          node scripts/set-version.mjs
          node -e "process.stdout.write('version=' + require('fs').readFileSync('VERSION','utf8').trim() + '\n')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: "Harpocrates ${{ steps.version.outputs.version }}"
          releaseBody: |
            See the assets below to download and install this version of Harpocrates.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

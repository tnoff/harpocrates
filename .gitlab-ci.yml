include:
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c3e8e55214cddced785b232cbee75d6c5e45ec81
    file: '/gitlab/bump-version.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - test
  - tag
  - notify
  - renovate

bump-version:
  extends: .bump-version
  variables:
    VERSION_FILE: 'package.json'
    VERSION_FILE_TYPE: 'json'
    VERSION_JSON_KEY: 'version'
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

frontend-test:
  stage: validate
  image: docker.io/library/node:24-slim
  before_script:
    - npm ci
  script:
    - npx svelte-kit sync
    - npm test
    - npm run build
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

rust-check:
  stage: validate
  image: $CI_RUST_TAURI_IMAGE
  variables:
    CARGO_INCREMENTAL: "0"
    CARGO_PROFILE_DEV_DEBUG: "0"
    CARGO_BUILD_JOBS: "2"
  script:
    - cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tag-build:
  extends: .tag
  stage: tag
  variables:
    VERSION_FILE: './package.json'
    VERSION_FILE_TYPE: 'json'
    VERSION_JSON_KEY: 'version'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_OPENED_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-renovate-failure:
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_MERGED_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

include:
  - project: 'tnoff-projects/github-workflows'
    ref: c727d141564e2e8c86b1ac327df3698e0d521640
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c727d141564e2e8c86b1ac327df3698e0d521640
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c727d141564e2e8c86b1ac327df3698e0d521640
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c727d141564e2e8c86b1ac327df3698e0d521640
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: c727d141564e2e8c86b1ac327df3698e0d521640
    file: '/gitlab/bump-version.yml'

default:
  tags:
    - self-hosted

stages:
  - validate
  - test
  - tag
  - notify
  - renovate

bump-version:
  extends: .bump-version
  variables:
    VERSION_FILE: 'package.json'
    VERSION_FILE_TYPE: 'json'
    VERSION_JSON_KEY: 'version'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

frontend-test:
  stage: validate
  image: docker.io/library/node:20-slim
  before_script:
    - npm ci
  script:
    - npx svelte-kit sync
    - npm test
    - npm run build
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

rust-check:
  stage: validate
  image: docker.io/library/rust:1
  before_script:
    - apt-get update -qq
    - |
      apt-get install -y -qq \
        libwebkit2gtk-4.1-dev \
        libappindicator3-dev \
        librsvg2-dev \
        patchelf \
        libdbus-1-dev \
        libssl-dev \
        pkg-config
    - rustup component add clippy
  script:
    - cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
    - cargo build --manifest-path src-tauri/Cargo.toml
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tag-build:
  extends: .tag
  stage: tag
  variables:
    VERSION_FILE: './package.json'
    VERSION_FILE_TYPE: 'json'
    VERSION_JSON_KEY: 'version'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
